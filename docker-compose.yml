services:
  gateway:
    build: .
    container_name: clinical-ai-gateway
    ports:
      - "8000:8000"
    environment:
      GATEWAY_OLLAMA_BASE_URL: "http://ollama:11434"
      GATEWAY_OLLAMA_MODEL: "llama3.2:1b"
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: clinical-ai-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
